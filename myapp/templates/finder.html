{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">
    Home
</h1>

<div class="folder-grid">

    {% for folder in folders %}

    <a
        href="{% url 'folder_detail' folder.id %}"
        class="folder-item"
    >

        <div class="folder-icon">
            📁
        </div>

        <span>
            {{ folder.name }}
        </span>

    </a>

    {% endfor %}

</div>

{% endblock %}
