{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">Home</h1>

<div class="gallery">

    {% for folder in folders %}

    <a href="{% url 'folder_detail' folder.id %}"
       class="folder-card">

        <div class="folder-icon">
            📁
        </div>

        <div class="folder-name">
            {{ folder.name }}
        </div>

    </a>

    {% endfor %}

</div>

{% endblock %}
